{% extends 'master.html' %} 

{% block content %}
<style>
  form {
    border-radius: 5px;
    background-color: #f2f2f2;
    padding: 20px;
  }

  label {
    display: block;
  }

  input[type="text"],
  select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    display: inline-block;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
  }
  input[type="email"],
  select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    display: inline-block;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
  }

  input[type="submit"] {
    width: 100%;
    background-color: #4caf50;
    color: white;
    padding: 14px;
    margin: 8px 0;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  input[type="submit"]:hover {
    background-color: #45a049;
  }
</style>
<h1>Edit Student Data Table</h1>
<form action="{% url 'editResume' id=person.id %}" method="POST">
  {% csrf_token %}
  <label for="name">Full Name</label>
  <input
    type="text"
    id="full_name"
    name="full_name"
    placeholder="Your name.."
    value="{{ person.full_name }}"
  />

  <label for="email">Email</label>
  <input type="email" id="email" name="email" placeholder="Your Email.." value="{{ person.email }}" />

  <label for="phone">Phone</label>
  <input
    type="text"
    id="phone"
    name="phone"
    placeholder="Your phone.."
    value="{{ person.phone }}"
  />

  <label for="address">Address</label>
  <input type="text" id="address" name="address" placeholder="Your address.." value="{{ person.address }}" />

  <input type="submit" value="Edit Person" />
</form>

{% endblock content %}
