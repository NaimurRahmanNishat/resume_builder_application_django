{% extends 'master.html' %}

{% block content %}
<h1>Student Data</h1>
<table>
  <tr>
    <th>Name</th>
    <th>Email</th>
    <th>Department</th>
    <th>Address</th>
    <th>Actions</th>
  </tr>
  {% for student in studentData %}
  <tr>
    <td>{{ student.name }}</td>
    <td>{{ student.email }}</td>
    <td>{{ student.department }}</td>
    <td>{{ student.address }}</td>
    <td>
      <a href="{% url 'editStudent' id=student.id %}">Edit</a>
      <a href="{% url 'deleteStudent' id=student.id %}">Delete</a>
    </td>
  </tr>
  {% endfor %}
</table>
{% endblock content %}
